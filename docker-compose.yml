services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-subreco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-subreco}
      POSTGRES_DB: ${POSTGRES_DB:-subreco}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subreco}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        INSTALL_TOOLS: ${INSTALL_TOOLS:-true}
    env_file: .env
    environment:
      ROLE: api
    volumes:
      - screenshots:/data/screenshots
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      args:
        INSTALL_TOOLS: ${INSTALL_TOOLS:-true}
    env_file: .env
    environment:
      ROLE: worker
    volumes:
      - screenshots:/data/screenshots
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - screenshots:/usr/share/nginx/html/screenshots:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  screenshots:
